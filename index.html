<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Haji 7aman Snacks — Order</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',sans-serif;background:#F7F3EE;color:#1C1810;min-height:100vh;}

    /* HEADER */
    header{background:#1C1810;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #D4A843;position:sticky;top:0;z-index:50;}
    .logo{font-size:18px;color:#D4A843;font-weight:bold;}
    .cart-bubble{background:#D4A843;color:#1C1810;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:bold;cursor:pointer;display:none;}

    /* PAGES */
    .page{display:none;} .page.active{display:block;}

    /* ── INFO PAGE ── */
    .info-wrap{max-width:480px;margin:0 auto;padding:28px 20px;}
    .info-title{font-size:22px;font-weight:bold;color:#1C1810;margin-bottom:6px;}
    .info-sub{font-size:14px;color:#9A8A70;margin-bottom:24px;}
    .field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    .field-group label{font-size:12px;font-weight:700;color:#7A6A5A;letter-spacing:0.5px;text-transform:uppercase;}
    .field-group input{padding:13px 14px;border:1.5px solid #E0D8CC;border-radius:10px;font-size:16px;font-family:inherit;outline:none;color:#1C1810;background:#FFF;}
    .field-group input:focus{border-color:#D4A843;}
    .start-btn{width:100%;padding:15px;background:#D4A843;color:#1C1810;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;margin-top:8px;}

    /* ── MENU PAGE ── */
    .menu-wrap{max-width:600px;margin:0 auto;padding:16px 14px 120px;}
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
    .m-card{background:#FFF;border:2px solid #E8E0D0;border-radius:14px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;transition:all 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
    .m-card.selected{border-color:#D4A843;background:#FFFBF0;}
    .m-card.out{opacity:0.45;}
    .m-badge{position:absolute;top:-8px;right:-8px;background:#D4A843;color:#1C1810;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid #FFF;}
    .m-img{width:80px;height:65px;object-fit:contain;}
    .m-name{font-size:12px;font-weight:700;text-align:center;color:#1C1810;line-height:1.3;}
    .m-price{font-size:13px;color:#D4A843;font-weight:bold;}
    .m-out{font-size:11px;color:#E05050;font-weight:bold;}
    .m-qty{display:flex;align-items:center;gap:6px;margin-top:4px;}
    .mqb{width:28px;height:28px;border-radius:7px;border:1.5px solid #E0D8CC;background:#F7F3EE;color:#D4A843;font-size:17px;cursor:pointer;font-weight:bold;line-height:1;display:flex;align-items:center;justify-content:center;}
    .mqb:disabled{opacity:0.3;cursor:not-allowed;}
    .mqn{width:30px;text-align:center;font-size:14px;font-weight:bold;color:#1C1810;}

    /* STICKY CART BAR */
    .cart-bar{position:fixed;bottom:0;left:0;right:0;background:#1C1810;border-top:3px solid #D4A843;padding:12px 20px;display:none;align-items:center;gap:12px;z-index:60;}
    .cart-bar.show{display:flex;}
    .cart-info{flex:1;color:#F5F0E8;}
    .cart-count{font-size:12px;color:#9A8A70;}
    .cart-total{font-size:17px;font-weight:bold;color:#D4A843;}
    .checkout-btn{padding:12px 22px;background:#D4A843;color:#1C1810;border:none;border-radius:10px;font-weight:bold;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;}

    /* ── REVIEW PAGE ── */
    .review-wrap{max-width:480px;margin:0 auto;padding:20px 16px 30px;}
    .review-title{font-size:18px;font-weight:bold;margin-bottom:16px;}
    .review-item{display:flex;align-items:center;gap:12px;padding:10px;background:#FFF;border:1.5px solid #E8E0D0;border-radius:10px;margin-bottom:8px;}
    .review-img{width:44px;height:44px;object-fit:contain;}
    .review-info{flex:1;}
    .review-name{font-weight:700;font-size:14px;}
    .review-sub{font-size:12px;color:#9A8A70;margin-top:2px;}
    .review-amt{font-size:14px;font-weight:bold;color:#D4A843;}
    .review-total-box{background:#1C1810;border-radius:12px;padding:14px 16px;margin:14px 0;}
    .review-total-row{display:flex;justify-content:space-between;font-size:14px;color:#9A8A70;padding:3px 0;}
    .review-total-bold{color:#D4A843;font-size:18px;font-weight:bold;}
    .customer-info-box{background:#FFF;border:1.5px solid #E0D8CC;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#5A4A3A;}
    .customer-info-box strong{color:#1C1810;}
    .place-btn{width:100%;padding:15px;background:#D4A843;color:#1C1810;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;}
    .place-btn:disabled{background:#E0D8CC;color:#AAA;cursor:not-allowed;}
    .back-link{display:flex;align-items:center;gap:6px;color:#9A8A70;font-size:13px;cursor:pointer;margin-bottom:14px;}

    /* ── TRACKING PAGE ── */
    .track-wrap{max-width:480px;margin:0 auto;padding:28px 20px;}
    .track-order-id{font-size:13px;color:#9A8A70;margin-bottom:6px;}
    .track-name{font-size:20px;font-weight:bold;margin-bottom:20px;}
    .track-steps{display:flex;flex-direction:column;gap:0;}
    .track-step{display:flex;gap:14px;position:relative;}
    .track-step-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0;}
    .track-dot{width:36px;height:36px;border-radius:50%;border:3px solid #E0D8CC;background:#FFF;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:1;flex-shrink:0;}
    .track-dot.done{border-color:#D4A843;background:#D4A843;}
    .track-dot.active{border-color:#D4A843;background:#FFF;box-shadow:0 0 0 4px rgba(212,168,67,0.2);}
    .track-line{width:3px;background:#E0D8CC;flex:1;min-height:28px;}
    .track-line.done{background:#D4A843;}
    .track-step-right{padding:6px 0 28px;}
    .track-step-title{font-size:15px;font-weight:700;color:#1C1810;}
    .track-step-title.active{color:#D4A843;}
    .track-step-title.pending{color:#CCC;}
    .track-step-sub{font-size:12px;color:#9A8A70;margin-top:3px;}
    .track-ready-banner{background:linear-gradient(135deg,#2A8A4A,#1A6A3A);border-radius:14px;padding:20px;text-align:center;margin-top:10px;color:#FFF;}
    .track-ready-icon{font-size:48px;margin-bottom:8px;}
    .track-ready-title{font-size:20px;font-weight:bold;margin-bottom:6px;}
    .track-ready-sub{font-size:14px;opacity:0.85;}
    .track-items{margin-top:16px;background:#FFF;border:1.5px solid #E0D8CC;border-radius:10px;overflow:hidden;}
    .track-items-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#9A8A70;padding:10px 14px;border-bottom:1px solid #E0D8CC;}
    .track-item-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #F0EAE0;font-size:13px;}
    .track-item-row:last-child{border-bottom:none;}
    .pulse{animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #D4A843;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

<header>
  <div class="logo">🛒 Haji 7aman Snacks</div>
  <div class="cart-bubble" id="cart-bubble" onclick="goToReview()"></div>
</header>

<!-- PAGE 1: Customer Info -->
<div class="page active" id="page-info">
  <div class="info-wrap">
    <div class="info-title">Place Your Order 🛍️</div>
    <div class="info-sub">Enter your details to start ordering</div>
    <div class="field-group">
      <label>Your Name</label>
      <input type="text" id="cust-name" placeholder="e.g. Ahmed Ali" autocomplete="name"/>
    </div>
    <div class="field-group">
      <label>Phone Number</label>
      <input type="tel" id="cust-phone" placeholder="e.g. 3XXXXXXX" autocomplete="tel"/>
    </div>
    <button class="start-btn" onclick="startOrdering()">Browse Menu →</button>
  </div>
</div>

<!-- PAGE 2: Menu -->
<div class="page" id="page-menu">
  <div class="menu-wrap">
    <div class="section-label" style="margin-bottom:14px">Choose Your Items</div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>
  <div class="cart-bar" id="cart-bar">
    <div class="cart-info">
      <div class="cart-count" id="cart-count-label"></div>
      <div class="cart-total" id="cart-total-label"></div>
    </div>
    <button class="checkout-btn" onclick="goToReview()">Review Order →</button>
  </div>
</div>

<!-- PAGE 3: Review & Submit -->
<div class="page" id="page-review">
  <div class="review-wrap">
    <div class="back-link" onclick="goBack()">← Back to Menu</div>
    <div class="review-title">Review Your Order</div>
    <div class="customer-info-box" id="review-customer-box"></div>
    <div id="review-items"></div>
    <div class="review-total-box" id="review-total-box"></div>
    <button class="place-btn" id="place-btn" onclick="submitOrder()">Place Order 🛍️</button>
  </div>
</div>

<!-- PAGE 4: Tracking -->
<div class="page" id="page-track">
  <div class="track-wrap">
    <div class="track-order-id" id="track-order-id"></div>
    <div class="track-name" id="track-name"></div>
    <div class="track-steps" id="track-steps"></div>
    <div class="track-items" id="track-items-list"></div>
  </div>
</div>

  const DEFAULT_MENU = [
    {id:1,name:"Choki Choki",       price:0.200,stock:20,emoji:"🍫"},
    {id:2,name:"Bahrain Pufak",     price:0.050,stock:30,emoji:"🍿"},
    {id:3,name:"Miro Chocolate",    price:0.100,stock:25,emoji:"🍬"},
    {id:4,name:"Basmah Green Puff", price:0.050,stock:30,emoji:"🟢"},
    {id:5,name:"Ritz Cracker",      price:0.100,stock:20,emoji:"🟡"},
    {id:6,name:"Big Top",           price:0.050,stock:35,emoji:"🍭"},
    {id:7,name:"TimeOut Chocolate", price:0.200,stock:15,emoji:"🍫"},
    {id:8,name:"Sando Wafers",      price:0.100,stock:22,emoji:"🍪"},
    {id:9,name:"KitKat",            price:0.200,stock:18,emoji:"🍫"},
  ];

  let menuItems = [];
  let cart = {};
  let customerName = '', customerPhone = '';
  let trackUnsub = null;

  // ── LOAD MENU FROM FIREBASE ──
  function loadMenu(){
    try {
      // Live listener — menu updates instantly when owner changes it
      onSnapshot(collection(db, "menu"), snap => {
        if(!snap.empty){
          menuItems = [];
          snap.forEach(d => {
            const data = d.data();
            // Guard: price must be a float (e.g. 0.200), never an integer like 200
            if(typeof data.price === 'number' && data.price > 1) data.price = data.price / 1000;
            if(typeof data.price === 'string') data.price = parseFloat(data.price);
            menuItems.push({...data, fbId:d.id});
          });
        } else {
          menuItems = DEFAULT_MENU;
        }
        renderMenuGrid();
      }, err => {
        console.error("Menu load error:", err);
        menuItems = DEFAULT_MENU;
        renderMenuGrid();
      });
    } catch(e){
      menuItems = DEFAULT_MENU;
      renderMenuGrid();
    }
  }

  function fils(bhd){ return Math.round(bhd*1000) + " fils"; }
  function getImg(item){ return IMAGES[item.id] || item.imgData || null; }

  function renderMenuGrid(){
    const g = document.getElementById('menu-grid');
    g.innerHTML = '';
    menuItems.forEach(item => {
      const qty = cart[item.id] || 0;
      const out = item.stock === 0;
      const src = getImg(item);
      const imgEl = src ? `<img class="m-img" src="${src}" alt="${item.name}"/>` : `<div style="width:80px;height:65px;display:flex;align-items:center;justify-content:center;font-size:30px">${item.emoji}</div>`;
      const card = document.createElement('div');
      card.className = 'mcard m-card' + (qty>0?' selected':'') + (out?' out':'');
      card.id = 'mcard-'+item.id;
      card.innerHTML = `
        ${qty>0?`<div class="m-badge">${qty}</div>`:''}
        ${imgEl}
        <div class="m-name">${item.name}</div>
        <div class="m-price">${fils(item.price)}</div>
        ${out ? `<div class="m-out">Out of Stock</div>` :
          `<div class="m-qty">
            <button class="mqb" onclick="chQty(${item.id},-1)" ${qty===0?'disabled':''}>−</button>
            <span class="mqn">${qty}</span>
            <button class="mqb" onclick="chQty(${item.id},1)" ${qty>=item.stock?'disabled':''}>+</button>
          </div>`}`;
      g.appendChild(card);
    });
    updateCartBar();
  }

  window.chQty = function(id, delta){
    const item = menuItems.find(m=>m.id===id);
    if(!item) return;
    const cur = cart[id]||0;
    const nxt = Math.max(0, Math.min(item.stock, cur+delta));
    if(nxt===0) delete cart[id]; else cart[id]=nxt;
    renderMenuGrid();
  };

  function updateCartBar(){
    const items = menuItems.filter(m=>(cart[m.id]||0)>0);
    const total = items.reduce((s,m)=>s+m.price*cart[m.id],0);
    const qty   = items.reduce((s,m)=>s+cart[m.id],0);
    const bar   = document.getElementById('cart-bar');
    if(qty>0){
      bar.classList.add('show');
      document.getElementById('cart-count-label').textContent = qty+' item'+(qty!==1?'s':'');
      document.getElementById('cart-total-label').textContent = total.toFixed(3)+' BHD';
    } else {
      bar.classList.remove('show');
    }
  }

  window.startOrdering = function(){
    customerName  = document.getElementById('cust-name').value.trim();
    customerPhone = document.getElementById('cust-phone').value.trim();
    if(!customerName){ alert('Please enter your name'); return; }
    if(!customerPhone){ alert('Please enter your phone number'); return; }
    showPage('page-menu');
  };

  window.goToReview = function(){
    const items = menuItems.filter(m=>(cart[m.id]||0)>0);
    if(!items.length){ alert('Please add at least one item'); return; }
    const total = items.reduce((s,m)=>s+m.price*cart[m.id],0);
    // Customer info
    document.getElementById('review-customer-box').innerHTML =
      `<strong>${customerName}</strong> &nbsp;·&nbsp; 📞 ${customerPhone}`;
    // Items
    document.getElementById('review-items').innerHTML = items.map(it=>{
      const src = getImg(it);
      const imgEl = src ? `<img class="review-img" src="${src}"/>` : `<div style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:24px">${it.emoji}</div>`;
      return `<div class="review-item">${imgEl}
        <div class="review-info"><div class="review-name">${it.name}</div><div class="review-sub">×${cart[it.id]} @ ${fils(it.price)}</div></div>
        <div class="review-amt">${fils(it.price*cart[it.id])}</div>
      </div>`;
    }).join('');
    // Total
    document.getElementById('review-total-box').innerHTML = `
      <div class="review-total-row"><span>Items</span><span>${items.reduce((s,m)=>s+cart[m.id],0)}</span></div>
      <div class="review-total-row" style="margin-top:8px"><span style="color:#D4A843;font-size:14px;">TOTAL</span><span class="review-total-bold">${total.toFixed(3)} BHD</span></div>`;
    showPage('page-review');
  };

  window.goBack = function(){ showPage('page-menu'); };

  window.submitOrder = async function(){
    const btn = document.getElementById('place-btn');
    btn.disabled = true;
    btn.textContent = 'Placing order...';
    const items = menuItems.filter(m=>(cart[m.id]||0)>0);
    const total = items.reduce((s,m)=>s+m.price*cart[m.id],0);
    const orderData = {
      customerName, customerPhone,
      items: items.map(m=>({id:m.id, name:m.name, qty:cart[m.id], price:m.price, emoji:m.emoji, imgData:getImg(m)||null})),
      total, status:'received',
      createdAt: new Date(),
      time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    };
    try {
      const ref = await addDoc(collection(db, 'customer_orders'), orderData);
      cart = {};
      startTracking(ref.id, orderData);
    } catch(e){
      btn.disabled = false;
      btn.textContent = 'Place Order 🛍️';
      alert('Error placing order. Please try again.');
    }
  };

  function startTracking(orderId, initialData){
    showPage('page-track');
    document.getElementById('track-order-id').textContent = 'Order #' + orderId.slice(-6).toUpperCase();
    document.getElementById('track-name').textContent = '👋 Hi, ' + initialData.customerName + '!';
    renderTrackItems(initialData.items);
    renderTrackSteps(initialData.status);
    // Live listener
    if(trackUnsub) trackUnsub();
    trackUnsub = onSnapshot(doc(db,'customer_orders',orderId), snap => {
      if(snap.exists()){
        const data = snap.data();
        renderTrackSteps(data.status);
        if(data.status==='ready') playReadySound();
      }
    });
  }

  function renderTrackItems(items){
    const el = document.getElementById('track-items-list');
    el.innerHTML = `<div class="track-items-title">Your Order</div>` +
      items.map(it=>`<div class="track-item-row">
        <span>${it.name} ×${it.qty}</span>
        <span style="color:#D4A843;font-weight:600">${fils(it.price*it.qty)}</span>
      </div>`).join('');
  }

  const STEPS = [
    {key:'received',  icon:'📥', label:'Order Received',  sub:'We got your order!'},
    {key:'preparing', icon:'👨‍🍳', label:'Preparing',       sub:'Your snacks are being prepared...'},
    {key:'ready',     icon:'✅', label:'Ready to Pickup!', sub:'Come collect your order 🎉'},
  ];

  function renderTrackSteps(status){
    const statusIdx = STEPS.findIndex(s=>s.key===status);
    const el = document.getElementById('track-steps');

    if(status==='ready'){
      el.innerHTML = '';
      document.getElementById('track-items-list').style.display='none';
      // Show big ready banner
      el.innerHTML = `<div class="track-ready-banner">
        <div class="track-ready-icon">🎉</div>
        <div class="track-ready-title">Your order is ready!</div>
        <div class="track-ready-sub">Please come collect your snacks 🛍️</div>
      </div>`;
      return;
    }

    document.getElementById('track-items-list').style.display='block';
    el.innerHTML = STEPS.map((step, i) => {
      const isDone   = i < statusIdx;
      const isActive = i === statusIdx;
      const isPending= i > statusIdx;
      const isLast   = i === STEPS.length-1;
      const dotClass = isDone?'done':isActive?'active':'';
      const lblClass = isDone?'':isActive?'active':'pending';
      const spinnerHtml = isActive && status!=='ready' ? '<span class="spinner"></span>' : '';
      return `<div class="track-step">
        <div class="track-step-left">
          <div class="track-dot ${dotClass}">${isDone?'✓':step.icon}</div>
          ${!isLast?`<div class="track-line ${isDone?'done':''}"></div>`:''}
        </div>
        <div class="track-step-right">
          <div class="track-step-title ${lblClass}">${spinnerHtml}${step.label}</div>
          <div class="track-step-sub">${isActive?step.sub:isDone?'Done ✓':'Waiting...'}</div>
        </div>
      </div>`;
    }).join('');
  }

  function playReadySound(){
    try{const ctx=new AudioContext();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(523,ctx.currentTime);o.frequency.setValueAtTime(659,ctx.currentTime+0.15);o.frequency.setValueAtTime(784,ctx.currentTime+0.3);g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.8);}catch(e){}
  }

  function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  // Init
  loadMenu();
</script>
</body>
</html>
